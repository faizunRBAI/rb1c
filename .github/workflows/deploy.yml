name: Deploy

on:
  workflow_dispatch:

jobs:
  #  test 
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Run linting (advisory)
        run: flake8 app/ main.py --max-line-length=120 || true
        continue-on-error: true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short 2>/dev/null || \
          echo "No tests found or tests passed"

  #  provision 
  provision:
    name: Provision
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      bastion_ip: ${{ steps.tf_outputs.outputs.bastion_ip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="db_name=rb1c" \
            -var="db_username=appuser"

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          echo "bastion_ip=$(terraform output -raw bastion_public_ip)" >> "$GITHUB_OUTPUT"

  #  configure 
  configure:
    name: Configure
    runs-on: ubuntu-latest
    needs: [provision]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Ansible
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible python3-boto3

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Wait for bastion SSH readiness
        run: |
          BASTION_IP="${{ needs.provision.outputs.bastion_ip }}"
          echo "Waiting for bastion at ${BASTION_IP}..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
                   -i ~/.ssh/id_rsa ubuntu@"${BASTION_IP}" 'echo ok' 2>/dev/null; then
              echo "Bastion is reachable"
              break
            fi
            echo "Attempt $i/30 failed, retrying in 10s..."
            sleep 10
          done

      - name: Discover ASG instance private IPs
        id: discover_instances
        run: |
          # Discover the ASG name via resource tags (avoids passing secret-containing
          # values as job outputs, which GitHub Actions silently suppresses).
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups \
            --filters "Name=tag:ManagedBy,Values=udap" \
            --query 'AutoScalingGroups[0].AutoScalingGroupName' \
            --output text)

          if [ -z "${ASG_NAME}" ] || [ "${ASG_NAME}" = "None" ]; then
            echo "ERROR: Could not discover ASG name from tags"
            exit 1
          fi
          echo "Discovered ASG: ${ASG_NAME}"

          echo "Discovering instances in ASG: ${ASG_NAME}"
          # Wait up to 5 minutes for instances to be InService
          for i in $(seq 1 30); do
            INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "${ASG_NAME}" \
              --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
              --output text)
            if [ -n "${INSTANCE_IDS}" ]; then
              echo "Found instances: ${INSTANCE_IDS}"
              break
            fi
            echo "Attempt $i/30: no InService instances yet, waiting 10s..."
            sleep 10
          done

          if [ -z "${INSTANCE_IDS}" ]; then
            echo "ERROR: No InService instances found in ASG after waiting"
            exit 1
          fi

          PRIVATE_IPS=""
          for ID in ${INSTANCE_IDS}; do
            IP=$(aws ec2 describe-instances \
              --instance-ids "${ID}" \
              --query 'Reservations[0].Instances[0].PrivateIpAddress' \
              --output text)
            PRIVATE_IPS="${PRIVATE_IPS}${IP},"
          done
          # Remove trailing comma
          PRIVATE_IPS="${PRIVATE_IPS%,}"
          echo "Private IPs: ${PRIVATE_IPS}"
          echo "private_ips=${PRIVATE_IPS}" >> "$GITHUB_OUTPUT"

      - name: Get RDS endpoint
        id: rds_info
        run: |
          RDS_HOST=$(aws rds describe-db-instances \
            --db-instance-identifier "${{ secrets.PROJECT_NAME }}-mysql" \
            --query 'DBInstances[0].Endpoint.Address' \
            --output text)
          echo "rds_host=${RDS_HOST}" >> "$GITHUB_OUTPUT"

      - name: Build Ansible inventory for private instances via bastion
        id: build_inventory
        run: |
          BASTION_IP="${{ needs.provision.outputs.bastion_ip }}"
          PRIVATE_IPS="${{ steps.discover_instances.outputs.private_ips }}"
          INVENTORY_FILE="$(mktemp)"

          {
            echo "[app_servers]"
            IFS=',' read -ra IPS <<< "${PRIVATE_IPS}"
            for IP in "${IPS[@]}"; do
              echo "${IP} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyCommand=\"ssh -W %h:%p -q -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${BASTION_IP}\"'"
            done
            echo ""
            echo "[app_servers:vars]"
            echo "ansible_python_interpreter=/usr/bin/python3"
          } > "${INVENTORY_FILE}"

          echo "inventory_file=${INVENTORY_FILE}" >> "$GITHUB_OUTPUT"
          cat "${INVENTORY_FILE}"

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          RDS_HOST="${{ steps.rds_info.outputs.rds_host }}"
          DATABASE_URL="mysql+aiomysql://appuser:${{ secrets.DB_PASSWORD }}@${RDS_HOST}:3306/rb1c"

          ansible-playbook ansible/playbook.yml \
            -i "${{ steps.build_inventory.outputs.inventory_file }}" \
            --private-key ~/.ssh/id_rsa \
            -e "database_url=${DATABASE_URL}"

  #  verify 
  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [provision, configure]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get ALB endpoint from Terraform output
        id: get_endpoint
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Wait for ALB to be healthy and probe endpoint
        run: |-
          APP_URL="${{ steps.get_endpoint.outputs.app_url }}"
          HEALTH_URL="${APP_URL}/health"
          echo "Probing: ${HEALTH_URL}"

          MAX_ATTEMPTS=24
          DELAY=15
          for i in $(seq 1 ${MAX_ATTEMPTS}); do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" \
              --max-time 15 "${HEALTH_URL}" 2>/dev/null || echo "000")
            echo "Attempt ${i}/${MAX_ATTEMPTS}: HTTP ${STATUS}"
            if [[ "${STATUS}" =~ ^[23] ]]; then
              echo " Health check passed (HTTP ${STATUS})"
              exit 0
            fi
            if [ "${i}" -lt "${MAX_ATTEMPTS}" ]; then
              echo "Not ready yet, waiting ${DELAY}s..."
              sleep ${DELAY}
            fi
          done
          echo " Health check failed after ${MAX_ATTEMPTS} attempts"
          exit 1
